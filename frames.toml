input_folder = "fastlane/screenshots"
output_folder = "fastlane/screenshots/framed"
string_catalog = "fastlane/screenshots/Screenshots.xcstrings"
font_file = "fastlane/screenshots/OpenSans-VariableFont_wdth,wght.ttf"

# Device ids, simulators, bezels, and framing geometry: screenshot_devices.toml
devices = "screenshot_devices.toml"

[[screens]]
device_pattern = ".*"
screen_pattern = ".*"

[screens.style]
background_color = "#f0f0f0"
shadow_color = "#888888"
text_color = "#17541F"
text_offset = [60, 60]
text_size = 100
font_spacing = 10

[[screens]]
device_pattern = ".*"
screen_pattern = "01_documents"
title_key = "documentView"

[[screens]]
device_pattern = ".*"
screen_pattern = "02_filter_tags"
title_key = "tagsFilter"

[[screens]]
device_pattern = ".*"
screen_pattern = "03_document_view"
title_key = "documentDetailView"

[[screens]]
device_pattern = ".*"
screen_pattern = "04_document_edit"
title_key = "documentEditing"
