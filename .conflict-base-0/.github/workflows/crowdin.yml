name: Crowdin synchronization

on:
  workflow_dispatch:
  schedule:
    - cron: '2 */12 * * *'
  push:
    paths: [
      'AppShared/Sources/AppShared/Resources/Localization/*.xcstrings',
    ]
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  synchronize-with-crowdin:
    name: Crowdin Sync
    runs-on: ubuntu-latest

    env:
      CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
      CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: j178/prek-action@v2
        with:
          prek-version: '0.3.x'
          install-only: true

      - name: Crowdin push
        uses: crowdin/github-action@v2
        with:
          command: push

      - name: Crowdin pull
        uses: crowdin/github-action@v2
        with:
          command: pull

      - name: Fix generated files
        run: |
          sudo chown $(whoami):$(whoami) AppShared/Sources/AppShared/Resources/Localization/*.xcstrings
          prek run end-of-file-fixer --files AppShared/Sources/AppShared/Resources/Localization/*.xcstrings || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          title: 'chore: Update localization'
          commit-message: 'chore: Update localization'
          branch: l18n_update
          delete-branch: true
          body: "Automated update of localizations from Crowdin"
          base: main
          add-paths: AppShared/Sources/AppShared/Resources/Localization
