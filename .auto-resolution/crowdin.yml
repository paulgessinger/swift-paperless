project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN
preserve_hierarchy: true
files:
  - source: AppShared/Sources/AppShared/Resources/Localization/*.xcstrings
    translation: AppShared/Sources/AppShared/Resources/Localization/%original_file_name%
    multilingual: true
    # Xcode can auto-create an orphan default-table "Localizable.xcstrings" on IDE
    # builds; it only holds junk (real strings live in App.xcstrings), so never sync it.
    ignore:
      - "**/Localizable.xcstrings"
