# Shared device definitions for capture, framing, and bezel download.
#
# - `id` is the screenshot filename prefix (used by capture and frame).
# - `simulator_name` is the Xcode simulator display name (for build/boot).
# - `bezel` is the PNG filename from Apple's Product Bezels DMG.
#
# Keep `id` stable when changing simulators; update `simulator_name` and `bezel`
# when moving to new hardware generations.

frames_dir = "fastlane/screenshots/frames"

[[device]]
id = "iPad_Pro_13_M5"
simulator_name = "iPad Pro 13-inch"
bezel_pack = "ipad_pro_m5"
bezel = 'iPad Pro (M5) 13" - Space Black - Portrait.png'
target_size = [2064, 2752]
offset = [120, 125]
post_offset = [0, 500]
mask_corner_radius = 50
mask_margin = 10

# iPhone screenshots use Pro Max only; App Store Connect scales for smaller phones.
[[device]]
id = "iPhone_17_Pro_Max"
simulator_name = "iPhone 17 Pro Max"
bezel_pack = "iphone_17"
bezel = "iPhone 17 Pro Max - Silver - Portrait.png"
target_size = [1320, 2868]
offset = [74, 68]
post_offset = [0, 500]
mask_corner_radius = 150
mask_margin = 0
